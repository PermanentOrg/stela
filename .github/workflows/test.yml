name: unit tests
on: [push, workflow_dispatch]
jobs:
    run_tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@v1
              with:
                  node-version: "18"
            - run: npm install --production=false
            - run: npm run test --coverage
            - uses: codecov/codecov-action@v2
