location:
  description: A geographic location object
  type: object
  required: [id]
  properties:
    id:
      type: string
    name:
      type: string
    sublocation:
      type: string
    city:
      type: string
    state:
      type: string
    postalCode:
      type: string
    country:
      type: string
    latitude:
      type: number
    longitude:
      type: number
    altitudeMeters:
      type: number
    precision:
      type: string
      enum: [approximate, uncertain, unknown]
    streetNumber:
      type: string
      deprecated: true
    streetName:
      type: string
      deprecated: true
    locality:
      type: string
      deprecated: true
    county:
      type: string
      deprecated: true
    countryCode:
      type: string
      deprecated: true
    displayName:
      type: string
      deprecated: true
