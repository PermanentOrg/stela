folderWithChildren:
  description: A folder in the Permanent filesystem, including its direct children
  allOf:
    - $ref: "#/folder"
    - type: object
      required: [children]
      properties:
        children:
          type: array
          items:
            oneOf:
              - $ref: "#/folder"
              - $ref: "./record.yaml#/record"
folder:
  description: A folder in the Permanent filesystem
  type: object
  required:
    - id
    - displayName
    - archive
    - status
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    size:
      type: integer
    location:
      $ref: "../models/location.yaml#/location"
    locationDisplayName:
      type: string
      nullable: true
    locationGeoCodeLookup:
      type: string
      nullable: true
    locationStreetNumber:
      type: string
      nullable: true
    locationStreetName:
      type: string
      nullable: true
    locationPostalCode:
      type: string
      nullable: true
    locationLocality:
      type: string
      nullable: true
    locationAdminOneName:
      type: string
      nullable: true
    locationAdminOneCode:
      type: string
      nullable: true
    locationAdminTwoName:
      type: string
      nullable: true
    locationAdminTwoCode:
      type: string
      nullable: true
    locationCountry:
      type: string
      nullable: true
    locationCountryCode:
      type: string
      nullable: true
    locationGeometryType:
      type: string
      nullable: true
    locationLatitude:
      type: number
      nullable: true
    locationLongitude:
      type: number
      nullable: true
    locationBoundSouth:
      type: number
      nullable: true
    locationBoundWest:
      type: number
      nullable: true
    locationBoundNorth:
      type: number
      nullable: true
    locationBoundEast:
      type: number
      nullable: true
    locationGeometryAsArray:
      type: string
      nullable: true
    locationGeoCodeType:
      type: string
      nullable: true
    locationSublocation:
      type: string
      nullable: true
    locationAltitudeMeters:
      type: number
      nullable: true
    locationLocationPrecision:
      type: string
      enum: [approximate, uncertain, unknown]
      nullable: true
    locationRawMetadata:
      type: object
      nullable: true
    parentFolder:
      type: object
      properties:
        id:
          type: string
    shares:
      type: array
      items:
        $ref: "../models/share.yaml#/share"
    pendingShares:
      nullable: true
      type: array
      description: >
        Pending share invitations on this folder. Returns an array for users
        with manager or higher access to the folder's archive; null otherwise.
      items:
        $ref: "../models/share.yaml#/pendingShare"
    tags:
      type: array
      items:
        $ref: "../models/tag.yaml#/tag"
    archive:
      type: object
      required: [id]
      properties:
        id:
          type: string
        name:
          type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    description:
      type: string
    displayTimestamp:
      type: string
      format: date-time
    displayEndTimestamp:
      type: string
      format: date-time
    displayTime:
      type: string
      format: edtf
    displayName:
      type: string
    downloadName:
      type: string
    imageRatio:
      type: number
    paths:
      type: object
      properties:
        names:
          type: array
          items:
            type: string
    publicAt:
      type: string
      format: date-time
    sort:
      type: string
      enum:
        - date-descending
        - date-ascending
        - type-descending
        - type-ascending
        - alphabetical-descending
        - alphabetical-ascending
    thumbnailUrls:
      type: object
      properties:
        200:
          type: string
        256:
          type: string
        500:
          type: string
        1000:
          type: string
        2000:
          type: string
    type:
      type: string
      enum:
        - app
        - public
        - private
        - root
        - app-root
        - share-root
        - private-root
        - public-root
        - deprecated
    status:
      type: string
      enum:
        - ok
        - deleted
        - copying
        - moving
    view:
      type: string
      enum:
        - list
        - timeline
        - grid
        - deprecated
