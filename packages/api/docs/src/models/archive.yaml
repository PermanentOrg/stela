archive:
  description: Archive object
  type: object
  required:
    - id
    - archiveId
    - rootFolderId
    - name
    - public
    - allowPublicDownload
    - thumbnailUrls
    - status
    - type
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    archiveId:
      type: string
      deprecated: true
    rootFolderId:
      type: string
    description:
      type: string
    name:
      type: string
    payerAccountId:
      type: string
    public:
      type: boolean
    publicAt:
      type: string
      format: date-time
    allowPublicDownload:
      type: boolean
    thumbnailUrls:
      type: object
      properties:
        width200:
          type: string
        width500:
          type: string
        width1000:
          type: string
        width2000:
          type: string
    owner:
      type: object
      description: Owner information. Only returned for admin-authenticated requests.
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
    callerMembershipRole:
      description: The authenticated user's archive membership role. Only returned when filtering by callerMembershipRole.
      $ref: "./archive_membership_role.yaml#/archiveMembershipRole"
    status:
      type: string
      enum:
        - ok
        - orphaned
        - deleted
        - generate-avatar
    type:
      $ref: "./archive_type.yaml#/archiveType"
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    milestoneSortOrder:
      type: string
      enum:
        - chronological
        - reverse_chronological
archiveSummary:
  description: A minimal, summary version of an archive object
  type: object
  required:
    - id
    - name
    - thumbnailUrls
  properties:
    id:
      type: string
    name:
      type: string
    thumbnailUrls:
      type: object
      properties:
        width200:
          type: string
        width500:
          type: string
        width1000:
          type: string
        width2000:
          type: string
